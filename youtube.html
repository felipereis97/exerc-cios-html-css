<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube</title>

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        ::-webkit-scrollbar {
            width: 0;
            height: 0;
        }

        img {
            width: 100vw;
            display: block;
        }

        a {
            display: block;
            background-color: darkred;
            color: white;
            text-align: center;
            font-weight: bold;
            padding: 20px;
            text-decoration: none;
        }

        a:hover {
            background-color: red;
        }
    </style>
</head>
<body>
    <img src="imagens/tela-youtube.jpg" alt="Canal Curso em Vídeo">

    <a href="https://www.youtube.com/user/cursoemvideo/playlists" target="_blank">
        ACESSE O CANAL
    </a>
</body>
</html>
